<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Mom 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* Container */
.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
    position: relative;
    z-index: 2;
}

/* Intro */
#intro {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* Gift box */
#giftBox {
    display: none;
    font-size: 80px;
    cursor: pointer;
    animation: bounce 1s infinite;
}

@keyframes bounce {
    50% { transform: translateY(-15px); }
}

/* Main */
#main {
    display: none;
}

/* Photo */
#photo {
    width: 100%;
    max-height: 400px;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(255,255,255,0.6);
}

/* Caption */
#caption {
    margin: 12px 0 20px;
    font-size: 18px;
}

/* Buttons */
button {
    margin: 6px;
    padding: 12px 20px;
    border-radius: 25px;
    border: none;
    font-size: 16px;
    background: white;
    color: #ff4d6d;
    cursor: pointer;
}

/* Cake */
#cake {
    width: 150px;
    margin-top: 15px;
    cursor: pointer;
}

/* Floating hearts */
.heart {
    position: fixed;
    bottom: -20px;
    font-size: 24px;
    animation: floatUp 5s linear forwards;
    z-index: 1;
}

@keyframes floatUp {
    to {
        transform: translateY(-110vh);
        opacity: 0;
    }
}

/* Confetti */
.confetti {
    position: fixed;
    top: -10px;
    animation: fall 3s linear forwards;
    z-index: 1;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container">

<!-- Intro -->
<div id="intro">
    <h1>🎂 Hey Mom 💕</h1>
    <p>I made something for you...</p>
    <button onclick="start()">Open 🎁</button>
</div>

<!-- Gift -->
<div id="giftBox" onclick="openGift()">🎁</div>

<!-- Main -->
<div id="main">
    <h1>Happy Birthday Mom 💖</h1>

    <img id="photo" src="photo1.jpg" alt="Mom photo">
    <div id="caption"></div>

    <div>
        <button onclick="prev()">⬅️ Previous</button>
        <button onclick="next()">Next ➡️</button>
    </div>

    <h2>Cut the Cake 🎂</h2>
    <img id="cake" src="cake.png" onclick="cutCake()">

    <div>
        <button onclick="playVoice()">💌 Hear My Message</button>
        <button onclick="playSong()">🎂 Play Birthday Song</button>
    </div>
</div>

</div>

<!-- Audio -->
<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<audio id="voice">
    <source src="voice.mp3">
</audio>

<audio id="song">
    <source src="happybirthday.mp3">
</audio>

<script>
let photos = [
    { src: "photo1.jpg", text: "My favorite person ❤️" },
    { src: "photo2.jpg", text: "Thank you for everything 💕" },
    { src: "photo3.jpg", text: "I love you so much ✨" }
];

let i = 0;

function start() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("giftBox").style.display = "block";
}

function openGift() {
    document.getElementById("giftBox").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.getElementById("music").play();
    showPhoto();
    createHearts();
    createConfetti();
}

function showPhoto() {
    document.getElementById("photo").src = photos[i].src;
    document.getElementById("caption").innerText = photos[i].text;
}

function next() {
    i = (i + 1) % photos.length;
    showPhoto();
}

function prev() {
    i = (i - 1 + photos.length) % photos.length;
    showPhoto();
}

function cutCake() {
    alert("🎉 Cake cut!! Love you mom 💖");
    for (let j = 0; j < 40; j++) createConfettiBurst();
}

function playVoice() {
    let v = document.getElementById("voice");
    let s = document.getElementById("song");
    s.pause(); s.currentTime = 0;
    v.play();
}

function playSong() {
    let v = document.getElementById("voice");
    let s = document.getElementById("song");
    v.pause(); v.currentTime = 0;
    s.play();
}

/* Effects */
function createHearts() {
    setInterval(() => {
        let h = document.createElement("div");
        h.className = "heart";
        h.innerText = "❤️";
        h.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 5000);
    }, 400);
}

function createConfetti() {
    setInterval(createConfettiBurst, 300);
}

function createConfettiBurst() {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.width = "8px";
    c.style.height = "8px";
    c.style.background =
        ["yellow", "pink", "white", "red"][Math.floor(Math.random() * 4)];
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
}
</script>

</body>
</html>
