<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Mom 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    text-align: center;
    overflow: hidden;
}

/* Intro */
#intro {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Gift */
#giftBox {
    display: none;
    font-size: 100px;
    margin-top: 100px;
    cursor: pointer;
    animation: bounce 1s infinite;
}

@keyframes bounce {
    50% { transform: translateY(-20px); }
}

/* Main */
#main {
    display: none;
}

/* Photo */
img {
    width: 280px;
    height: 380px;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 0 20px pink;
}

/* Cake */
#cake {
    width: 200px;
    margin-top: 20px;
    cursor: pointer;
}

#cake:active {
    transform: scale(0.95);
}

/* Caption */
#caption {
    margin-top: 10px;
}

/* Buttons */
button {
    padding: 10px 18px;
    border-radius: 20px;
    border: none;
    margin: 8px;
    cursor: pointer;
}

/* Hearts */
.heart {
    position: absolute;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* Confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    from { transform: translateY(-10vh); }
    to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<!-- Intro -->
<div id="intro">
    <h1>🎂 Hey Mom 💕</h1>
    <p>I made something for you...</p>
    <button onclick="start()">Open 🎁</button>
</div>

<!-- Gift -->
<div id="giftBox" onclick="openGift()">🎁</div>

<!-- Main -->
<div id="main">
    <h1>Happy Birthday Mom 💖</h1>

    <!-- Photo -->
    <img id="photo" src="photo1.jpg">
    <div id="caption">Our memories 💕</div>

    <br>
    <button onclick="prev()">⬅️</button>
    <button onclick="next()">➡️</button>

    <!-- Cake -->
    <h2>Cut the Cake 🎂</h2>
    <img id="cake" src="cake.png" onclick="cutCake()">

    <!-- Audio buttons -->
    <br>
    <button onclick="playVoice()">💌 Hear My Message</button>
    <button onclick="playSong()">🎂 Play Birthday Song</button>
</div>

<!-- Background Music -->
<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<!-- Voice -->
<audio id="voice">
    <source src="voice.mp3">
</audio>

<!-- Birthday Song -->
<audio id="song">
    <source src="happybirthday.mp3">
</audio>

<script>
let photos = [
    {src: "photo1.jpg", text: "My favorite person ❤️"},
    {src: "photo2.jpg", text: "Thank you for everything 💕"},
    {src: "photo3.jpg", text: "I love you so much ✨"}
];

let i = 0;

function start() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("giftBox").style.display = "block";
}

function openGift() {
    document.getElementById("giftBox").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.getElementById("music").play();
    showPhoto();
    createHearts();
    createConfetti();
}

function showPhoto() {
    document.getElementById("photo").src = photos[i].src;
    document.getElementById("caption").innerText = photos[i].text;
}

function next() {
    i = (i + 1) % photos.length;
    showPhoto();
}

function prev() {
    i = (i - 1 + photos.length) % photos.length;
    showPhoto();
}

/* Cake */
function cutCake() {
    alert("YAYYY 🎉 Cake cut!! Love you mom 💖");
    for(let j=0;j<40;j++) createConfettiBurst();
}

/* Voice */
function playVoice() {
    let v = document.getElementById("voice");
    let s = document.getElementById("song");
    s.pause();
    s.currentTime = 0;
    v.play();
}

/* Song */
function playSong() {
    let v = document.getElementById("voice");
    let s = document.getElementById("song");
    v.pause();
    v.currentTime = 0;
    s.play();
}

/* Hearts */
function createHearts() {
    setInterval(() => {
        let h = document.createElement("div");
        h.className = "heart";
        h.innerText = "❤️";
        h.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 5000);
    }, 300);
}

/* Confetti */
function createConfetti() {
    setInterval(() => {
        createConfettiBurst();
    }, 200);
}

function createConfettiBurst() {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = ["yellow","pink","white","red"][Math.floor(Math.random()*4)];
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
}
</script>

</body>
</html>
